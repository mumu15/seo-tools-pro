    <text x="130" y="292" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Ideal density</text>
    <rect x="240" y="240" width="180" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="330" y="270" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#34d399" text-anchor="middle">3-4%</text>
    <text x="330" y="292" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Risk of stuffing</text>
    <rect x="440" y="240" width="180" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="530" y="270" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#34d399" text-anchor="middle">0.5%</text>
