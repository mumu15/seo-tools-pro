  <line x1="40" y1="120" x2="300" y2="120" stroke="#10b981" stroke-width="2"/>

  <!-- Subtitle -->
  <text x="40" y="155" font-family="Arial, sans-serif" font-size="13" fill="#94a3b8">Key data at a glance — Updated 2026</text>

  <!-- Stats -->
  
    <rect x="40" y="240" width="180" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
