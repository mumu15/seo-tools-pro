    <text x="130" y="382" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Use synonyms</text>
    <rect x="240" y="330" width="180" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
    <text x="330" y="360" font-family="Arial, sans-serif" font-size="22" font-weight="bold" fill="#34d399" text-anchor="middle">NLP</text>
    <text x="330" y="382" font-family="Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">Google uses this</text>
    <rect x="440" y="330" width="180" height="70" rx="8" fill="#1e293b" stroke="#334155" stroke-width="1"/>
